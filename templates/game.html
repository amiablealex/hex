<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HexaStack</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container" id="app">
        <div class="game-header">
            <div class="score-block" id="p1Score">
                <div class="score-label">Player 1</div>
                <div class="score-value" id="p1Value">0</div>
            </div>
            <div class="turn-indicator">
                <div class="turn-dot" id="turnDot"></div>
                <div class="turn-text" id="turnText">—</div>
            </div>
            <div class="score-block" id="p2Score">
                <div class="score-label">Player 2</div>
                <div class="score-value" id="p2Value">0</div>
            </div>
        </div>

        <div class="target-score" id="targetScore"></div>

        <div class="board-container">
            <svg class="board-svg" id="boardSvg" viewBox="0 0 400 400"></svg>
        </div>

        <div class="status-bar">
            <div class="status-text" id="statusText">Loading…</div>
        </div>

        <div class="picker-area hidden" id="pickerArea">
            <div class="picker-label" id="pickerLabel">Place your 3 stacks</div>
            <div class="picker-stacks" id="pickerStacks"></div>
        </div>

        <div class="share-section" id="shareSection">
            <div class="share-link" id="shareLink" onclick="copyLink()">
                <span class="copy-icon">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="5" y="5" width="8" height="8" rx="1.5"/>
                        <path d="M3 11V3.5A1.5 1.5 0 0 1 4.5 2H11"/>
                    </svg>
                </span>
                <span id="shareLinkText">Copy link to share</span>
            </div>
            <div class="copied-toast" id="copiedToast">Copied!</div>
        </div>
    </div>

    <div class="game-over hidden" id="gameOver">
        <div class="game-over-card fade-in">
            <h2 id="gameOverTitle">Game Over</h2>
            <div class="final-scores">
                <div class="score-block">
                    <div class="score-label">Player 1</div>
                    <div class="score-value" id="finalP1">0</div>
                </div>
                <div class="score-block">
                    <div class="score-label">Player 2</div>
                    <div class="score-value" id="finalP2">0</div>
                </div>
            </div>
            <a href="/" class="btn btn-primary">New game</a>
            <button class="btn mt-8" onclick="document.getElementById('gameOver').classList.add('hidden')">
                View board
            </button>
        </div>
    </div>

    <div class="points-popup hidden" id="pointsPopup">+0</div>

    <script>
    const GAME_ID = '{{ game_id }}';
    const HEX_SIZE = 36;
    const SVG_NS = 'http://www.w3.org/2000/svg';

    let gameState = null;
    let selectedStack = null;
    let isAnimating = false;
    let hexPositions = {};

    // ---- Hex geometry ----

    function hexToPixel(q, r, size) {
        const x = size * (Math.sqrt(3) * q + (Math.sqrt(3) / 2) * r);
        const y = size * (1.5 * r);
        return { x, y };
    }

    function hexCorners(cx, cy, size) {
        const corners = [];
        for (let i = 0; i < 6; i++) {
            const angle = (Math.PI / 180) * (60 * i - 30);
            corners.push({
                x: cx + size * Math.cos(angle),
                y: cy + size * Math.sin(angle),
            });
        }
        return corners;
    }

    // ---- Turn logic ----

    function isMyTurn() {
        if (!gameState) return false;
        if (gameState.status !== 'active') return false;
        if (gameState.game_mode === 'local') return true;
        return gameState.player_number === gameState.current_turn;
    }

    function remainingStacks() {
        if (!gameState) return 0;
        return gameState.offered_stacks.filter(s => s !== null).length;
    }

    // ---- Rendering ----

    function calcBoardLayout() {
        if (!gameState) return {};
        const coords = gameState.coords;
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        coords.forEach(([q, r]) => {
            const { x, y } = hexToPixel(q, r, HEX_SIZE);
            minX = Math.min(minX, x - HEX_SIZE);
            maxX = Math.max(maxX, x + HEX_SIZE);
            minY = Math.min(minY, y - HEX_SIZE);
            maxY = Math.max(maxY, y + HEX_SIZE);
        });
        const pad = 20;
        return {
            vw: maxX - minX + pad * 2,
            vh: maxY - minY + pad * 2,
            ox: -minX + pad,
            oy: -minY + pad,
        };
    }

    function renderBoard(highlightHex = null) {
        if (!gameState) return;

        const svg = document.getElementById('boardSvg');
        svg.innerHTML = '';

        const coords = gameState.coords;
        const board = gameState.board;
        const colours = gameState.colours;
        const layout = calcBoardLayout();

        svg.setAttribute('viewBox', `0 0 ${layout.vw} ${layout.vh}`);
        hexPositions = {};

        coords.forEach(([q, r]) => {
            const key = `${q},${r}`;
            const { x, y } = hexToPixel(q, r, HEX_SIZE);
            const cx = x + layout.ox;
            const cy = y + layout.oy;
            const stack = board[key] || [];

            hexPositions[key] = { cx, cy };

            const g = document.createElementNS(SVG_NS, 'g');
            g.classList.add('hex-cell');
            g.dataset.hex = key;

            if (stack.length > 0) g.classList.add('has-tiles');
            if (gameState.last_move && gameState.last_move.hex === key) g.classList.add('last-move');
            if (highlightHex === key) g.classList.add('just-placed');
            if (selectedStack !== null && stack.length === 0 && isMyTurn()) g.classList.add('valid-target');

            const corners = hexCorners(cx, cy, HEX_SIZE - 2);
            const poly = document.createElementNS(SVG_NS, 'polygon');
            poly.setAttribute('points', corners.map(c => `${c.x},${c.y}`).join(' '));
            g.appendChild(poly);

            if (stack.length > 0) {
                const slabW = 28;
                const slabH = 7;
                const megaSlabH = 11;
                const megaSlabW = 32;
                const spacing = 3;

                // The mega-slab groups consecutive same-colour layers from the
                // BOTTOM of the topmost colour run, not blindly the bottom 5.
                // 
                // Example: [red, yellow, yellow, yellow, yellow, yellow, yellow]
                //   Top colour run = 6 yellows (indices 1-6)
                //   Mega groups the bottom 5 of that run → mega(5 yellow) + 1 yellow on top
                //   The red underneath is shown as a normal slab below the mega.
                //
                // We scan from the top to find the consecutive same-colour run,
                // then decide how to visualize it.

                const total = stack.length;

                // Count consecutive same-colour from top
                const topColour = stack[total - 1];
                let topRun = 0;
                for (let i = total - 1; i >= 0; i--) {
                    if (stack[i] === topColour) topRun++;
                    else break;
                }

                // Layers below the top colour run
                const belowCount = total - topRun;

                // Visual plan for the top run
                const hasMega = topRun >= 5;
                const megaCount = hasMega ? 5 : 0;
                const topIndividuals = hasMega ? topRun - 5 : topRun;

                // Below layers shown as individual slabs (max 4 visible)
                const belowShow = Math.min(belowCount, 4);

                // Calculate total visual height
                let totalH = 0;
                // Below slabs
                if (belowShow > 0) totalH += belowShow * slabH + (belowShow - 1) * spacing;
                // Gap between below and mega/top
                if (belowShow > 0 && (hasMega || topIndividuals > 0 || (!hasMega && topRun > 0))) totalH += spacing;
                // Mega slab
                if (hasMega) totalH += megaSlabH;
                // Gap between mega and top individuals
                if (hasMega && topIndividuals > 0) totalH += spacing;
                // Top individual slabs
                if (!hasMega && topRun > 0) totalH += topRun * slabH + (topRun - 1) * spacing;
                if (hasMega && topIndividuals > 0) totalH += topIndividuals * slabH + (topIndividuals - 1) * spacing;

                const baseY = cy + totalH / 2;
                let currentY = baseY;

                // 1. Draw below-run slabs (bottom of stack, different colour)
                for (let i = 0; i < belowShow; i++) {
                    const colourIdx = stack[belowCount - belowShow + i];
                    currentY -= slabH;
                    const rect = document.createElementNS(SVG_NS, 'rect');
                    rect.classList.add('tile-slab');
                    rect.setAttribute('x', cx - slabW / 2);
                    rect.setAttribute('y', currentY);
                    rect.setAttribute('width', slabW);
                    rect.setAttribute('height', slabH);
                    rect.setAttribute('rx', '3');
                    rect.setAttribute('fill', colours[colourIdx]);
                    rect.setAttribute('stroke', 'rgba(255,255,255,0.6)');
                    rect.setAttribute('stroke-width', '1');
                    g.appendChild(rect);
                    if (i < belowShow - 1) currentY -= spacing;
                }
                if (belowShow > 0) currentY -= spacing;

                // 2. Draw mega-slab if top run >= 5
                if (hasMega) {
                    currentY -= megaSlabH;
                    const rect = document.createElementNS(SVG_NS, 'rect');
                    rect.classList.add('tile-slab');
                    rect.setAttribute('x', cx - megaSlabW / 2);
                    rect.setAttribute('y', currentY);
                    rect.setAttribute('width', megaSlabW);
                    rect.setAttribute('height', megaSlabH);
                    rect.setAttribute('rx', '4');
                    rect.setAttribute('fill', colours[topColour]);
                    rect.setAttribute('stroke', 'rgba(255,255,255,0.8)');
                    rect.setAttribute('stroke-width', '1.5');
                    g.appendChild(rect);

                    const numLabel = document.createElementNS(SVG_NS, 'text');
                    numLabel.setAttribute('x', cx);
                    numLabel.setAttribute('y', currentY + megaSlabH / 2 + 1);
                    numLabel.setAttribute('text-anchor', 'middle');
                    numLabel.setAttribute('dominant-baseline', 'middle');
                    numLabel.setAttribute('font-size', '8');
                    numLabel.setAttribute('font-family', 'DM Mono, monospace');
                    numLabel.setAttribute('font-weight', '600');
                    numLabel.setAttribute('fill', 'rgba(255,255,255,0.9)');
                    numLabel.textContent = '5';
                    g.appendChild(numLabel);

                    if (topIndividuals > 0) currentY -= spacing;
                }

                // 3. Draw remaining individual slabs of the top colour run
                const individualsToShow = hasMega ? topIndividuals : topRun;
                if (!hasMega) {
                    // No mega — just draw top run as individuals (already handled gap above)
                }
                for (let i = 0; i < individualsToShow; i++) {
                    currentY -= slabH;
                    const rect = document.createElementNS(SVG_NS, 'rect');
                    rect.classList.add('tile-slab');
                    rect.setAttribute('x', cx - slabW / 2);
                    rect.setAttribute('y', currentY);
                    rect.setAttribute('width', slabW);
                    rect.setAttribute('height', slabH);
                    rect.setAttribute('rx', '3');
                    rect.setAttribute('fill', colours[topColour]);
                    rect.setAttribute('stroke', 'rgba(255,255,255,0.6)');
                    rect.setAttribute('stroke-width', '1');
                    g.appendChild(rect);
                    if (i < individualsToShow - 1) currentY -= spacing;
                }

                // 4. Badge if there are hidden below-layers
                if (belowCount > belowShow) {
                    const badge = document.createElementNS(SVG_NS, 'text');
                    badge.setAttribute('x', cx);
                    badge.setAttribute('y', baseY + 10);
                    badge.setAttribute('text-anchor', 'middle');
                    badge.setAttribute('font-size', '8');
                    badge.setAttribute('font-family', 'DM Mono, monospace');
                    badge.setAttribute('fill', '#B5AFAB');
                    badge.textContent = `+${belowCount - belowShow}`;
                    g.appendChild(badge);
                }
            }

            g.addEventListener('click', () => onHexClick(key));
            svg.appendChild(g);
        });
    }

    function renderPicker() {
        const container = document.getElementById('pickerStacks');
        const area = document.getElementById('pickerArea');
        const label = document.getElementById('pickerLabel');
        container.innerHTML = '';

        if (!gameState || gameState.status !== 'active' || !isMyTurn()) {
            area.classList.add('hidden');
            return;
        }

        area.classList.remove('hidden');
        const colours = gameState.colours;
        const remaining = remainingStacks();
        label.textContent = `Place your stacks (${remaining} left)`;

        gameState.offered_stacks.forEach((stack, idx) => {
            const div = document.createElement('div');
            div.classList.add('stack-option');

            if (stack === null) {
                // Already placed
                div.classList.add('placed');
                const check = document.createElement('div');
                check.classList.add('stack-check');
                check.textContent = '✓';
                div.appendChild(check);
            } else {
                if (selectedStack === idx) div.classList.add('selected');

                // Render tiles top-to-bottom
                for (let i = stack.length - 1; i >= 0; i--) {
                    const tile = document.createElement('div');
                    tile.classList.add('stack-tile');
                    tile.style.backgroundColor = colours[stack[i]];
                    div.appendChild(tile);
                }

                div.addEventListener('click', () => {
                    if (isAnimating) return;
                    selectedStack = idx;
                    renderPicker();
                    renderBoard();
                });
            }

            container.appendChild(div);
        });
    }

    function renderScores() {
        if (!gameState) return;

        document.getElementById('p1Value').textContent = gameState.player1_score;
        document.getElementById('p2Value').textContent = gameState.player2_score;
        document.getElementById('targetScore').textContent =
            `First to ${gameState.target_score} wins`;

        const p1Block = document.getElementById('p1Score');
        const p2Block = document.getElementById('p2Score');
        p1Block.classList.toggle('active', gameState.current_turn === 1);
        p2Block.classList.toggle('active', gameState.current_turn === 2);

        if (gameState.game_mode === 'link' && gameState.player_number) {
            const myBlock = gameState.player_number === 1 ? p1Block : p2Block;
            myBlock.querySelector('.score-label').textContent =
                `Player ${gameState.player_number} (you)`;
        }

        const turnText = document.getElementById('turnText');
        if (gameState.status === 'finished') {
            turnText.textContent = 'Done';
        } else {
            turnText.textContent = `P${gameState.current_turn}'s turn`;
        }
    }

    function renderStatus() {
        const el = document.getElementById('statusText');
        if (!gameState) { el.textContent = 'Loading…'; return; }

        if (gameState.status === 'finished') {
            el.textContent = 'Game over!';
            el.className = 'status-text';
            showGameOver();
            return;
        }

        if (gameState.game_mode === 'link') {
            if (gameState.player_number === null) {
                el.textContent = 'Watching — game is full';
                el.className = 'status-text waiting';
            } else if (!isMyTurn()) {
                el.textContent = `Waiting for Player ${gameState.current_turn}…`;
                el.className = 'status-text waiting';
            } else if (selectedStack !== null) {
                el.textContent = 'Tap an empty hex to place';
                el.className = 'status-text your-turn';
            } else {
                const r = remainingStacks();
                el.textContent = `Your turn — ${r} stack${r !== 1 ? 's' : ''} to place`;
                el.className = 'status-text your-turn';
            }
        } else {
            if (selectedStack !== null) {
                el.textContent = `P${gameState.current_turn}: tap an empty hex`;
                el.className = 'status-text your-turn';
            } else {
                const r = remainingStacks();
                el.textContent = `Player ${gameState.current_turn} — ${r} stack${r !== 1 ? 's' : ''} to place`;
                el.className = 'status-text your-turn';
            }
        }
    }

    function renderShareLink() {
        const section = document.getElementById('shareSection');
        if (gameState && gameState.game_mode === 'local') {
            section.classList.add('hidden');
            return;
        }
        section.classList.remove('hidden');
        document.getElementById('shareLinkText').textContent = window.location.href;
    }

    function showGameOver() {
        const overlay = document.getElementById('gameOver');
        overlay.classList.remove('hidden');
        document.getElementById('finalP1').textContent = gameState.player1_score;
        document.getElementById('finalP2').textContent = gameState.player2_score;

        const title = document.getElementById('gameOverTitle');
        if (gameState.player1_score > gameState.player2_score) {
            title.textContent = 'Player 1 wins!';
        } else if (gameState.player2_score > gameState.player1_score) {
            title.textContent = 'Player 2 wins!';
        } else {
            title.textContent = "It's a tie!";
        }
        document.getElementById('pickerArea').classList.add('hidden');
    }

    function renderAll() {
        renderBoard();
        renderPicker();
        renderScores();
        renderStatus();
        renderShareLink();
    }

    // ---- Animations ----

    function spawnParticles(svg, cx, cy, colour, count) {
        const particles = [];
        for (let i = 0; i < count; i++) {
            const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.4;
            const dist = 20 + Math.random() * 25;
            const size = 3 + Math.random() * 4;

            const circle = document.createElementNS(SVG_NS, 'circle');
            circle.setAttribute('cx', cx);
            circle.setAttribute('cy', cy);
            circle.setAttribute('r', size);
            circle.setAttribute('fill', colour);
            circle.setAttribute('opacity', '0.9');
            svg.appendChild(circle);

            const dx = Math.cos(angle) * dist;
            const dy = Math.sin(angle) * dist;

            circle.animate([
                { transform: 'translate(0, 0) scale(1)', opacity: 0.9 },
                { transform: `translate(${dx}px, ${dy}px) scale(0.2)`, opacity: 0 },
            ], { duration: 500 + Math.random() * 200, easing: 'ease-out', fill: 'forwards' });

            particles.push(circle);
        }
        return particles;
    }

    function showPointsAtHex(svg, cx, cy, points, colour) {
        const text = document.createElementNS(SVG_NS, 'text');
        text.setAttribute('x', cx);
        text.setAttribute('y', cy);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'middle');
        text.setAttribute('font-size', '16');
        text.setAttribute('font-family', 'DM Mono, monospace');
        text.setAttribute('font-weight', '600');
        text.setAttribute('fill', colour);
        text.textContent = `+${points}`;
        svg.appendChild(text);

        text.animate([
            { transform: 'translateY(0)', opacity: 1 },
            { transform: 'translateY(-30px)', opacity: 0 },
        ], { duration: 900, easing: 'ease-out', fill: 'forwards' });

        return text;
    }

    function bumpScore(player) {
        const el = document.getElementById(player === 1 ? 'p1Value' : 'p2Value');
        el.classList.remove('bump');
        void el.offsetWidth; // force reflow
        el.classList.add('bump');
    }

    // ---- Apply a single merge event to a local board copy ----

    function applyMergeToBoard(board, evt) {
        const fromStack = board[evt.from] || [];
        const toStack = board[evt.to] || [];
        const transferred = fromStack.slice(-evt.count);
        board[evt.from] = fromStack.slice(0, fromStack.length - evt.count);
        board[evt.to] = toStack.concat(transferred);
        return board;
    }

    function applyClearToBoard(board, evt) {
        const stack = board[evt.hex] || [];
        board[evt.hex] = stack.slice(0, stack.length - evt.count);
        return board;
    }

    async function animateMoveResult(data) {
        isAnimating = true;
        const colours = gameState.colours;
        const svg = document.getElementById('boardSvg');

        // 1. Clear selection immediately so valid-target outlines disappear
        selectedStack = null;

        // 2. Show board after placement (before any merges)
        const animBoard = JSON.parse(JSON.stringify(data.board_after_place));
        gameState.board = animBoard;
        const placedHex = data.last_move.hex;
        renderBoard(placedHex);
        await sleep(350);

        // 2. Animate merges incrementally — each merge modifies the displayed board
        const mergeEvents = data.merge_events || [];
        for (const evt of mergeEvents) {
            const fromPos = hexPositions[evt.from];
            const toPos = hexPositions[evt.to];

            if (fromPos && toPos) {
                // Draw sliding slab overlay
                const slab = document.createElementNS(SVG_NS, 'rect');
                slab.setAttribute('x', fromPos.cx - 14);
                slab.setAttribute('y', fromPos.cy - 4);
                slab.setAttribute('width', '28');
                slab.setAttribute('height', '8');
                slab.setAttribute('rx', '3');
                slab.setAttribute('fill', colours[evt.colour]);
                slab.setAttribute('opacity', '0.85');
                svg.appendChild(slab);

                const dx = toPos.cx - fromPos.cx;
                const dy = toPos.cy - fromPos.cy;
                slab.animate([
                    { transform: 'translate(0, 0)', opacity: 0.85 },
                    { transform: `translate(${dx}px, ${dy}px)`, opacity: 0.5 },
                ], { duration: 280, easing: 'ease-in-out', fill: 'forwards' });

                await sleep(280);
                slab.remove();
            }

            // Apply this single merge to our local board and re-render
            applyMergeToBoard(gameState.board, evt);
            renderBoard();
            await sleep(100);
        }

        // 3. Animate clears with particle burst
        const clearEvents = data.clear_events || [];
        if (clearEvents.length > 0) {
            // Board should now match board_after_merges — render it
            renderBoard();

            const allParticles = [];
            const allTexts = [];

            for (const evt of clearEvents) {
                const pos = hexPositions[evt.hex];
                if (pos) {
                    const colour = colours[evt.colour];
                    const particles = spawnParticles(svg, pos.cx, pos.cy, colour, 12);
                    allParticles.push(...particles);
                    const pointText = showPointsAtHex(svg, pos.cx, pos.cy, evt.count, colour);
                    allTexts.push(pointText);
                }

                // Apply clear to local board
                applyClearToBoard(gameState.board, evt);
            }

            if (data.points_scored > 0) {
                bumpScore(data.last_move.player);
            }

            await sleep(600);

            // Re-render after clears to show the cleared board
            renderBoard();

            await sleep(300);

            // Clean up overlay elements
            allParticles.forEach(p => { try { p.remove(); } catch(e) {} });
            allTexts.forEach(t => { try { t.remove(); } catch(e) {} });
        }

        // 4. Update state
        gameState.board = data.board;
        gameState.current_turn = data.current_turn;
        gameState.player1_score = data.player1_score;
        gameState.player2_score = data.player2_score;
        gameState.offered_stacks = data.offered_stacks;
        gameState.placed_this_turn = data.placed_this_turn;
        gameState.status = data.status;
        gameState.last_move = data.last_move;

        selectedStack = null;
        isAnimating = false;
        renderAll();
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    // ---- Interactions ----

    function onHexClick(hexKey) {
        if (isAnimating) return;
        if (!gameState || gameState.status !== 'active') return;
        if (!isMyTurn()) return;
        if (selectedStack === null) return;

        const stack = gameState.board[hexKey] || [];
        if (stack.length > 0) return;

        makeMove(selectedStack, hexKey);
    }

    async function makeMove(stackIndex, targetHex) {
        const statusEl = document.getElementById('statusText');
        statusEl.textContent = 'Placing…';

        try {
            const res = await fetch(`/api/game/${GAME_ID}/move`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    stack_index: stackIndex,
                    target_hex: targetHex,
                }),
            });

            const data = await res.json();

            if (data.error) {
                statusEl.textContent = data.error;
                statusEl.className = 'status-text waiting';
                return;
            }

            await animateMoveResult(data);

        } catch (e) {
            statusEl.textContent = 'Connection error, try again';
            isAnimating = false;
        }
    }

    // ---- Polling ----

    let pollInterval = null;

    function startPolling() {
        if (pollInterval) return;
        pollInterval = setInterval(async () => {
            if (!gameState || gameState.game_mode !== 'link') return;
            if (isMyTurn()) return;
            if (gameState.status !== 'active') return;

            try {
                const res = await fetch(`/api/game/${GAME_ID}`);
                const data = await res.json();

                if (data.current_turn !== gameState.current_turn ||
                    data.status !== gameState.status ||
                    data.placed_this_turn !== gameState.placed_this_turn) {
                    gameState = data;
                    selectedStack = null;
                    renderAll();
                }
            } catch (e) {}
        }, 3000);
    }

    // ---- Share ----

    function copyLink() {
        const url = window.location.href;
        navigator.clipboard.writeText(url).then(() => {
            const toast = document.getElementById('copiedToast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        });
    }

    // ---- Init ----

    async function loadGame() {
        try {
            const res = await fetch(`/api/game/${GAME_ID}`);
            gameState = await res.json();
            selectedStack = null;
            renderAll();
            startPolling();
        } catch (e) {
            document.getElementById('statusText').textContent = 'Could not load game';
        }
    }

    loadGame();
    </script>
</body>
</html>
